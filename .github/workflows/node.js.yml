  
  name: CI Base

  on: 
    push: 
      branches: ["main"]

  jobs:
    test:
      runs-on: ubuntu-latest

      strategy:
        matrix:
          node-version: ["20.x","22.x"]
      
      steps:
        - uses: actions/checkout@v4
        - name: Use Node.js ${{matrix.node-version}}
          uses: actions/setup-node@v4
          with:
            node-version: ${{matrix.node-version}}
            cache: 'npm'
        - run: npm ci 
        # - run: npm run lint
        - run: npm run test
        - name: Auth Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKERHUB_USERNAME }}
            password: ${{ secrets.DOCKERHUB_TOKEN }}
        - name: Build and push Docker image
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: ${{secrets.DOCKERHUB_USERNAME}}/my-app-demo:latest
        - name: Notify Slack
          if: always()
          uses: slackapi/slack-github-action@v1.24.0
          with:
            payload: |
              {
                "text": "${{ job.status == 'success' && '✅ CI/CD Pipeline Thành Công!' || '❌ CI/CD Pipeline Thất Bại!' }}\n- Nhánh (Branch): `${{ github.ref_name }}`\n- Người thực hiện: `${{ github.actor }}`\n- Xem chi tiết: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
              }
          env: 
            SLACK_WEBHOOK_URL: ${{secrets.SLACK_WEBHOOK_URL}}
            SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

